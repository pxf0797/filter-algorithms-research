name: CI

on:
  push:
    branches: [master, feat/*]
  pull_request:
    branches: [master]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ['3.11', '3.12']

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: ${{ matrix.python-version }}

    - name: Cache pip
      uses: actions/cache@v4
      with:
        path: ~/.cache/pip
        key: pip-${{ runner.os }}-${{ matrix.python-version }}-${{ hashFiles('filter_app/requirements.txt') }}

    - name: Install dependencies
      run: |
        pip install -r filter_app/requirements.txt
        pip install pytest pytest-cov ruff mypy types-requests

    - name: Security audit (pip-audit)
      run: |
        pip install pip-audit
        pip-audit

    - name: Lint with ruff
      run: ruff check . --ignore=E501,F841

    - name: Type check with mypy
      run: mypy filter_app/ --ignore-missing-imports --follow-imports=skip

    - name: Run tests (with streamlit mock)
      run: python -m pytest tests/ --ignore=tests/test_app_ui.py --ignore=tests/test_app_smoke.py --ignore=tests/test_streamlit_app.py --cov=filter_app --cov-report=term --cov-fail-under=55 --tb=short -q

    - name: Run AppTest UI tests (real streamlit)
      run: python -m pytest tests/test_app_ui.py tests/test_app_smoke.py tests/test_streamlit_app.py -q --tb=short
